<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Entrenador</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="centered">
    <div class="container">
        <a href="/admin/panel" class="back-link">← Volver al panel</a>
        <h2>✏️ Editar Entrenador</h2>

        <form th:action="@{/admin/entrenador/editar/{id}(id=${entrenador.idEntrenador})}" method="post"
            th:object="${entrenador}">
            <div class="form-group">
                <label>Nombre *</label>
                <input type="text" th:field="*{nombre}" required>
            </div>

            <div class="form-group">
                <label>Especialidad *</label>
                <input type="text" th:field="*{especialidad}" required>
            </div>

            <div class="form-group">
                <label>Horario *</label>
                <input type="text" th:field="*{horario}" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}">
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" th:field="*{telefono}">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">💾 Guardar Cambios</button>
        </form>
    </div>
</body>

</html>
