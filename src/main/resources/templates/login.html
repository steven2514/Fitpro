<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPro - Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="centered">
    <div class="container">
        <a href="/" class="back-link">← Volver al inicio</a>
        <h2>Iniciar Sesión</h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>

    <form action="/login" method="post">
            <div class="form-group">
                <label for="username">Documento o Email</label>
                <input type="text" id="username" name="username" placeholder="Documento (cliente) o Email (admin)" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
        </form>

        <p class="info-box mt-20">
            ¿No tienes cuenta? <a href="/registro">Regístrate aquí</a><br>
            ¿No tienes cuenta? <a href="/registroAdmin">Regístrate como admin aquí</a>
        </p>
    </div>
</body>

</html>
