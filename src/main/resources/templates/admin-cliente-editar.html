<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="centered">
    <div class="container">
        <a href="/admin/panel" class="back-link">← Volver al panel</a>
        <h2>✏️ Editar Cliente</h2>
        <form th:action="@{/admin/cliente/editar/{id}(id=${cliente.idCliente})}" method="post" th:object="${cliente}">
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre *</label>
                    <input type="text" th:field="*{nombre}" required>
                </div>
                <div class="form-group">
                    <label>Apellido *</label>
                    <input type="text" th:field="*{apellido}" required>
                </div>
            </div>
            <div class="form-group">
                <label>Documento *</label>
                <input type="text" th:field="*{documento}" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}">
            </div>
            <div class="form-group">
                <label>Teléfono *</label>
                <input type="text" th:field="*{telefono}" required>
            </div>
            <div class="form-group">
                <label>Dirección</label>
                <input type="text" th:field="*{direccion}">
            </div>
            <button type="submit" class="btn btn-primary btn-block">💾 Guardar Cambios</button>
        </form>
    </div>
</body>

</html>
