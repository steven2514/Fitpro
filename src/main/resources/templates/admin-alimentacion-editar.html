<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Plan Alimenticio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="centered">
    <div class="container">
        <a href="/admin/panel" class="back-link">← Volver al panel</a>
        <h2>✏️ Editar Plan Alimenticio</h2>

        <form th:action="@{/admin/alimentacion/editar/{id}(id=${alimentacion.idAlimentacion})}" method="post"
            th:object="${alimentacion}">
            <div class="form-group">
                <label>Cliente *</label>
                <select name="idCliente" required>
                    <option th:each="cliente : ${clientes}" th:value="${cliente.idCliente}"
                        th:selected="${cliente.idCliente == alimentacion.cliente.idCliente}"
                        th:text="${cliente.nombre + ' ' + cliente.apellido}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Tipo de Comida *</label>
                <select th:field="*{tipoComida}" required>
                    <option value="Desayuno">Desayuno</option>
                    <option value="Media Mañana">Media Mañana</option>
                    <option value="Almuerzo">Almuerzo</option>
                    <option value="Merienda">Merienda</option>
                    <option value="Cena">Cena</option>
                </select>
            </div>

            <div class="form-group">
                <label>Calorías *</label>
                <input type="number" th:field="*{calorias}" required>
            </div>

            <div class="form-group">
                <label>Descripción *</label>
                <textarea th:field="*{descripcion}" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-block">💾 Guardar Cambios</button>
        </form>
    </div>
</body>

</html>
