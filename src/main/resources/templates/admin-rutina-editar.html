<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Rutina</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="centered">
    <div class="container">
        <a href="/admin/panel" class="back-link">← Volver al panel</a>
        <h2>✏️ Editar Rutina</h2>

        <form th:action="@{/admin/rutina/editar/{id}(id=${rutina.idRutina})}" method="post" th:object="${rutina}">
            <div class="form-group">
                <label>Cliente *</label>
                <select name="idCliente" required>
                    <option th:each="cliente : ${clientes}" th:value="${cliente.idCliente}"
                        th:selected="${cliente.idCliente == rutina.cliente.idCliente}"
                        th:text="${cliente.nombre + ' ' + cliente.apellido}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Nombre *</label>
                <input type="text" th:field="*{nombre}" required>
            </div>

            <div class="form-group">
                <label>Objetivo *</label>
                <input type="text" th:field="*{objetivo}" required>
            </div>

            <div class="form-group">
                <label>Nivel *</label>
                <select th:field="*{nivel}" required>
                    <option value="Básico">Básico</option>
                    <option value="Intermedio">Intermedio</option>
                    <option value="Avanzado">Avanzado</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary btn-block">💾 Guardar Cambios</button>
        </form>
    </div>
</body>

</html>
