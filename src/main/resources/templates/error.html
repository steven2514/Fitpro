<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - FitPro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f5;font-family:sans-serif;">
    <div style="text-align:center;background:#fff;padding:2rem;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1);max-width:400px;">
        <h1 style="color:#ef4444;font-size:3rem;margin:0;">Error</h1>
        <p th:text="${error}">Ocurrió un error</p>
        <a th:href="@{/}" style="display:inline-block;margin-top:1rem;padding:0.6rem 1.2rem;background:#667eea;color:#fff;border-radius:8px;text-decoration:none;">Volver al inicio</a>
    </div>
</body>
</html>
